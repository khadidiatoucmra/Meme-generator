<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Mèmes</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/72x72/1f602.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold fs-4">Mème Generator</span>
  </nav>

  <div class="container my-4">
    <div class="row g-4">

      <div class="col-md-4">
        <div class="card p-3">

          <h6 class="fw-bold">📁 Image</h6>
          <input type="file" id="imageUpload" accept="image/*" class="form-control mb-3">
          <button onclick="clearCanvas()" class="btn btn-danger w-100 mb-3">🗑️ Effacer l'image</button>

          <h6 class="fw-bold">✏️ Texte du haut</h6>
          <input type="text" id="topText" class="form-control mb-2" placeholder="Texte en haut...">

          <h6 class="fw-bold">✏️ Texte du bas</h6>
          <input type="text" id="bottomText" class="form-control mb-3" placeholder="Texte en bas...">

          <h6 class="fw-bold">🎨 Couleur du texte</h6>
          <input type="color" id="textColor" value="#ffffff" class="form-control form-control-color mb-3">

          <h6 class="fw-bold">🔠 Taille du texte</h6>
          <input type="range" id="fontSize" min="20" max="80" value="40" class="form-range mb-3">

          <button onclick="downloadMeme()" class="btn btn-success w-100 mb-2">⬇️ Télécharger</button>
          <button onclick="saveMeme()" class="btn btn-primary w-100 mb-2">💾 Sauvegarder</button>
          <button onclick="shareMeme()" class="btn btn-info w-100 text-white">📤 Partager</button>

        </div>
      </div>

      <div class="col-md-8">
        <div class="card p-3 text-center">
          <h6 class="fw-bold mb-3">👁️ Aperçu en temps réel</h6>
          <canvas id="memeCanvas" width="600" height="400"></canvas>
        </div>
      </div>

    </div>

    <div class="mt-5">
      <h4 class="fw-bold">🖼️ Galerie</h4>
      <div id="gallery" class="row g-3 mt-2"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
